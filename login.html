<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Gestão de Apostas</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/auth.css">
</head>
<body class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <h1 class="auth-logo"><span>Bet</span>Analytix</h1>
      <p class="auth-subtitle">Gestão de Apostas Esportivas</p>
    </div>

    <div id="auth-alert" class="auth-alert auth-alert-danger"></div>

    <form id="login-form">
      <div class="form-group">
        <label for="email" class="form-label">E-mail</label>
        <input type="email" id="email" class="form-control" placeholder="seu@email.com" required>
      </div>

      <div class="form-group">
        <label for="password" class="form-label">Senha</label>
        <input type="password" id="password" class="form-control" placeholder="Sua senha" required>
      </div>

      <button type="submit" class="btn btn-primary btn-block" style="margin-top: 10px;">Entrar</button>
    </form>

    <div class="auth-footer">
      Não tem uma conta? <a href="register.html">Cadastre-se</a>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
