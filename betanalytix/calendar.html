<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calendário - BetAnalytix</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/calendar.css">
</head>

<body>
  <div class="app-container">

    <!-- Mobile Header -->
    <header class="mobile-header">
      <div class="auth-logo" style="font-size: 24px; margin-bottom: 0;"><span>Bet</span>Analytix</div>
      <button class="hamburger" id="hamburger-menu">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="3" y1="12" x2="21" y2="12"></line>
          <line x1="3" y1="6" x2="21" y2="6"></line>
          <line x1="3" y1="18" x2="21" y2="18"></line>
        </svg>
      </button>
    </header>

    <!-- Sidebar Menu -->
    <aside class="sidebar" id="sidebar-el">
      <div class="sidebar-brand">
        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#2563eb"
          stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 3v18h18"></path>
          <path d="m19 9-5 5-4-4-3 3"></path>
        </svg>
        <span>Bet</span>Analytix
      </div>
      <ul class="sidebar-menu">
        <li class="sidebar-item">
          <a href="index.html">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="7" height="7"></rect>
              <rect x="14" y="3" width="7" height="7"></rect>
              <rect x="14" y="14" width="7" height="7"></rect>
              <rect x="3" y="14" width="7" height="7"></rect>
            </svg>
            Dashboard
          </a>
        </li>
        <li class="sidebar-item">
          <a href="bets.html">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="8" y1="6" x2="21" y2="6"></line>
              <line x1="8" y1="12" x2="21" y2="12"></line>
              <line x1="8" y1="18" x2="21" y2="18"></line>
              <line x1="3" y1="6" x2="3.01" y2="6"></line>
              <line x1="3" y1="12" x2="3.01" y2="12"></line>
              <line x1="3" y1="18" x2="3.01" y2="18"></line>
            </svg>
            Minhas Apostas
          </a>
        </li>
        <li class="sidebar-item active">
          <a href="calendar.html">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
            Calendário
          </a>
        </li>
        <li class="sidebar-item">
          <a href="base.html">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
            Base
          </a>
        </li>
        <li class="sidebar-item" id="sidebar-admin-item" style="display: none;">
          <a href="admin.html">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
              <circle cx="9" cy="7" r="4"></circle>
              <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
              <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
            </svg>
            Painel Admin
          </a>
        </li>
      </ul>
      <div class="sidebar-footer">
        <div class="user-profile">
          <div class="user-avatar" id="sidebar-user-avatar">U</div>
          <div class="user-info">
            <span class="user-name" id="sidebar-user-name">Carregando...</span>
            <span class="user-email" id="sidebar-user-email">...</span>
          </div>
        </div>
        <button class="btn btn-secondary btn-block btn-sm" onclick="logout()">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
            <polyline points='16 17 21 12 16 7'></polyline>
            <line x1='21' y1='12' x2='9' y2='12'></line>
          </svg>
          Sair
        </button>
      </div>
    </aside>

    <!-- Main Content Area -->
    <main class="main-content">

      <!-- Top Header -->
      <section class="dashboard-header">
        <div class="dashboard-title-area">
          <h1>Calendário de Apostas</h1>
          <span class="dashboard-subtitle">Visualização mensal detalhada e controle de todas as suas entradas.</span>
        </div>
        
        <div class="dashboard-actions">
          <!-- Seletor de Banca Ativa -->
          <div class="bankroll-selector-wrapper">
            <select id="bankroll-select" class="bankroll-select">
              <option value="">Carregando bancas...</option>
            </select>
          </div>
          
          <button class="btn btn-primary btn-sm" id="btn-add-bet">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="12" y1="5" x2="12" y2="19"></line>
              <line x1="5" y1="12" x2="19" y2="12"></line>
            </svg>
            Nova Entrada
          </button>
        </div>
      </section>

      <!-- Calendário Card Completo -->
      <section class="calendar-container">
        <div class="calendar-header-nav">
          <button class="btn btn-secondary btn-sm" id="btn-prev-month" title="Mês Anterior" style="padding: 8px 12px;">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
          </button>
          <h2 class="calendar-month-title" id="calendar-title">Carregando...</h2>
          <button class="btn btn-secondary btn-sm" id="btn-next-month" title="Próximo Mês" style="padding: 8px 12px;">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
          </button>
        </div>

        <div class="calendar-grid-full" id="calendar-days-grid">
          <!-- Gerado via JavaScript -->
        </div>
      </section>

    </main>
  </div>

  <!-- MODAL: Adicionar Aposta -->
  <div class="modal" id="modal-bet">
    <div class="modal-content" style="max-width: 650px;">
      <div class="modal-header">
        <h3 class="modal-title" id="bet-modal-title">Nova Entrada</h3>
        <button class="modal-close" id="btn-close-bet-modal">&times;</button>
      </div>
      <form id="bet-form">
        <input type="hidden" id="bet-id">
        <div class="form-row">
          <div class="form-group">
            <label for="bet-date" class="form-label">Data</label>
            <input type="date" id="bet-date" class="form-control" required>
          </div>
          <div class="form-group">
            <label for="bet-time" class="form-label">Hora</label>
            <input type="time" id="bet-time" class="form-control" required>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="bet-title" class="form-label">Título da Aposta</label>
            <input type="text" id="bet-title" class="form-control" placeholder="Ex: Flamengo para vencer, Over 2.5 gols" required>
          </div>
          <div class="form-group">
            <label for="bet-sport" class="form-label">Esporte</label>
            <input type="text" id="bet-sport" class="form-control" placeholder="Ex: Futebol, Basquete, Tênis" list="sports-datalist" required>
            <datalist id="sports-datalist">
              <option value="Futebol">
              <option value="Basquete">
              <option value="Tênis">
              <option value="Vôlei">
              <option value="MMA/UFC">
              <option value="E-Sports">
            </datalist>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="bet-bookmaker" class="form-label">Casa de Apostas</label>
            <input type="text" id="bet-bookmaker" class="form-control" placeholder="Ex: Bet365, Betano, Pinnacle" list="bookmakers-datalist" required>
            <datalist id="bookmakers-datalist">
              <option value="Bet365">
              <option value="Betano">
              <option value="Pinnacle">
              <option value="Sportingbet">
              <option value="Betfair">
              <option value="1xBet">
            </datalist>
          </div>
          <div class="form-group">
            <label for="bet-bankroll" class="form-label">Banca</label>
            <select id="bet-bankroll" class="form-control" required>
              <!-- Preenchido via JS -->
            </select>
          </div>
        </div>

        <div class="grid-three" style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px;">
          <div class="form-group">
            <label for="bet-amount" class="form-label">Valor Apostado</label>
            <input type="number" id="bet-amount" class="form-control" placeholder="50.00" step="0.01" min="0.01" required>
          </div>
          <div class="form-group">
            <label for="bet-odds" class="form-label">Cotação (Odd)</label>
            <input type="number" id="bet-odds" class="form-control" placeholder="1.85" step="0.001" min="1.01" required>
          </div>
          <div class="form-group">
            <label for="bet-status" class="form-label">Status da Aposta</label>
            <select id="bet-status" class="form-control" required>
              <option value="Pending">Pendente</option>
              <option value="Won">Ganhou</option>
              <option value="Lost">Perdeu</option>
              <option value="Void">Anulada</option>
            </select>
          </div>
        </div>

        <div style="display: flex; gap: 12px; margin-top: 24px;">
          <button type="button" class="btn btn-secondary btn-block" id="btn-cancel-bet">Cancelar</button>
          <button type="submit" class="btn btn-primary btn-block">Confirmar</button>
        </div>
      </form>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/calendar.js"></script>
</body>

</html>
