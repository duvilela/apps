<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro - Gestão de Apostas</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/auth.css">
</head>
<body class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <h1 class="auth-logo"><span>Bet</span>Analytix</h1>
      <p class="auth-subtitle">Crie sua conta para gerenciar suas apostas</p>
    </div>

    <div id="auth-alert" class="auth-alert auth-alert-danger"></div>

    <form id="register-form">
      <div class="form-group">
        <label for="name" class="form-label">Nome Completo</label>
        <input type="text" id="name" class="form-control" placeholder="Seu nome" required>
      </div>

      <div class="form-group">
        <label for="email" class="form-label">E-mail</label>
        <input type="email" id="email" class="form-control" placeholder="seu@email.com" required>
      </div>

      <div class="form-group">
        <label for="password" class="form-label">Senha (mínimo 6 caracteres)</label>
        <div class="password-wrapper">
          <input type="password" id="password" class="form-control" placeholder="Crie uma senha forte" minlength="6" required>
          <button type="button" id="toggle-password" class="password-toggle" title="Mostrar/Ocultar Senha">
            <!-- Olho Aberto SVG -->
            <svg id="eye-open-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display: block;"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
            <!-- Olho Fechado SVG -->
            <svg id="eye-closed-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display: none;"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>
          </button>
        </div>
      </div>

      <button type="submit" class="btn btn-primary btn-block" style="margin-top: 10px;">Criar Conta</button>
    </form>

    <div class="auth-footer">
      Já tem uma conta? <a href="login.html">Faça Login</a>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
